<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: letter; margin: 0.5cm 1cm; }
        body { font-family: Helvetica, Arial, sans-serif; color: #111; }
        
        /* Contenedor principal para evitar saltos de página locos */
        .master-table { width: 100%; border-collapse: collapse; }
        
        /* Header Estilo Factura 12 */
        .title { font-size: 45pt; font-weight: 900; text-transform: uppercase; line-height: 0.8; }
        .meta { font-size: 11pt; color: #555; text-transform: uppercase; margin-top: 10pt; }
        
        .logo-box { text-align: center; width: 150pt; }
        .logo-circle { 
            width: 80pt; height: 80pt; 
            border: 5pt solid #000; 
            border-radius: 50%; 
            margin: auto;
        }
        
        .divider { height: 4pt; background-color: #1c1c34; margin: 15pt 0; }

        /* Bloque de Foto y Lote */
        .hero-table { width: 100%; border-collapse: collapse; background-color: #161932; }
        .photo-cell { width: 60%; padding: 0; background-color: #fff; }
        .info-cell { width: 40%; color: #fff; padding: 20pt; vertical-align: middle; }
        
        .label-yellow { color: #f7b500; font-size: 9pt; font-weight: bold; }
        .big-text { font-size: 26pt; font-weight: bold; margin-bottom: 20pt; }
        .lot-number { font-size: 45pt; font-weight: 900; color: #f7b500; }

        /* Tabla de montos */
        .items-table { width: 100%; border-collapse: collapse; margin-top: 20pt; }
        .items-table th { border-bottom: 2pt solid #eee; padding: 10pt 5pt; text-align: left; font-size: 10pt; }
        .items-table td { border-bottom: 1pt solid #eee; padding: 12pt 5pt; font-size: 12pt; }

        /* Total */
        .total-table { width: 300pt; border-collapse: collapse; margin-top: 20pt; }
        .total-label { background-color: #f7b500; padding: 15pt; font-weight: bold; text-align: center; width: 120pt; }
        .total-val { background-color: #161932; color: #fff; padding: 15pt; font-size: 28pt; font-weight: 900; text-align: center; }
    </style>
</head>
<body>

    <table class="master-table">
        <tr>
            <td>
                <div class="title">{{ producto }}</div>
                <div class="meta">
                    <b>Estado:</b> {{ estado }} &nbsp;&nbsp; | &nbsp;&nbsp; <b>Cliente:</b> {{ cliente }}
                </div>
            </td>
            <td class="logo-box">
                <div class="logo-circle">
                    </div>
                <div style="font-size: 18pt; font-weight: bold; margin-top: 5pt;">ESAÚ CARS</div>
            </td>
        </tr>
    </table>

    <div class="divider"></div>

    <table class="hero-table">
        <tr>
            <td class="photo-cell">
                <img src="{{ foto_url }}" style="width: 100%; height: 240pt; display: block;">
            </td>
            <td class="info-cell">
                <div class="label-yellow">FECHA DE OPERACIÓN</div>
                <div class="big-text">{{ fecha }}</div>
                <div class="label-yellow">ID DE INVENTARIO / LOTE</div>
                <div class="lot-number">#{{ lote }}</div>
            </td>
        </tr>
    </table>

    <table class="items-table">
        <thead>
            <tr>
                <th>DESCRIPCIÓN</th>
                <th style="text-align: right;">MONTO (USD)</th>
            </tr>
        </thead>
        <tbody>
            {% for item in costos %}
            <tr>
                <td>{{ item.Concepto }}</td>
                <td style="text-align: right; font-weight: bold;">$ {{ "{:,.2f}".format(item.Monto) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <table align="right" class="total-table">
        <tr>
            <td class="total-label">LIQUIDACIÓN TOTAL</td>
            <td class="total-val">$ {{ total }}</td>
        </tr>
    </table>

</body>
</html>
